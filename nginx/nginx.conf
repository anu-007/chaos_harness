# nginx load balancer for the coordinator cluster.
# Round-robins client HTTP across c1/c2/c3 and passes WebSocket upgrades on /ws
# through to a coordinator so workers can dial ws://lb:8080/ws.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Round-robin upstream over the three coordinators.
    upstream coords {
        server c1:8080;
        server c2:8080;
        server c3:8080;
    }

    # Map for WebSocket Upgrade/Connection header passthrough.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;

        # WebSocket endpoint: workers connect here and are pinned to one coordinator
        # for the life of the connection.
        location /ws {
            proxy_pass http://coords;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            # Long-lived: don't time out idle worker connections between dispatches.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # All other traffic (POST /jobs, GET /jobs/{id}, /stats, /chaos, /audit)
        # is plain HTTP round-robined across coordinators.
        location / {
            proxy_pass http://coords;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
