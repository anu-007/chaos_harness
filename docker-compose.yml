# FarLabs distributed job dispatcher stack.
# Step 7 brings up: postgres (source of truth), redis (optimization), three
# coordinators c1/c2/c3, and the nginx LB. Workers (w1..w5) and the harness runner
# are added in later steps. Service name == container_name for every coordinator so
# the harness can both DNS-resolve (c1/c2/c3, lb) and docker kill/start by name.

# Shared config (DATABASE_URL, REDIS_URL, LEASE_TTL_MS, LB_WS_URL, WORKER_CONCURRENCY) lives
# in the gitignored `.env` (copy from the committed `.env.example`) and is loaded per service
# via `env_file`. Only per-service identity (COORD_ID, WORKER_ID) is set inline below, since
# each container needs a distinct value that a single shared file can't provide.
#
# WORKER_CONCURRENCY (in .env): 5 workers x 16 = 80 concurrent slots. The harness submits at
# 50 jobs/s with a mixed profile (avg ~1.16s/job: 95% short 100-500ms + 5% long 5-30s), so
# steady-state drain needs ~58 slots (50 * 1.16). 80 gives headroom for the long-job tail and
# for slots tied up during fault windows (partition_db / pause_dispatch), so the backlog never
# grows unboundedly and jobs aren't left un-dispatched at drain -> no "lost" violations.
x-worker: &worker
  build:
    context: .
    dockerfile: worker/Dockerfile
  env_file:
    - .env
  depends_on:
    - lb

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: farlabs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d farlabs"]
      interval: 3s
      timeout: 3s
      retries: 10
    # No host port published: only the coordinators need it, on the compose network.

  redis:
    image: redis:7
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  c1:
    build:
      context: .
      dockerfile: coordinator/Dockerfile
    container_name: c1
    env_file:
      - .env
    environment:
      COORD_ID: c1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  c2:
    build:
      context: .
      dockerfile: coordinator/Dockerfile
    container_name: c2
    env_file:
      - .env
    environment:
      COORD_ID: c2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  c3:
    build:
      context: .
      dockerfile: coordinator/Dockerfile
    container_name: c3
    env_file:
      - .env
    environment:
      COORD_ID: c3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  lb:
    image: nginx:1.27
    container_name: lb
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      - c1
      - c2
      - c3

  w1:
    <<: *worker
    container_name: w1
    environment:
      WORKER_ID: w1

  w2:
    <<: *worker
    container_name: w2
    environment:
      WORKER_ID: w2

  w3:
    <<: *worker
    container_name: w3
    environment:
      WORKER_ID: w3

  w4:
    <<: *worker
    container_name: w4
    environment:
      WORKER_ID: w4

  w5:
    <<: *worker
    container_name: w5
    environment:
      WORKER_ID: w5

  # Chaos-harness runner. Behind the `chaos` profile so a plain `docker compose up` never
  # starts it; it is launched on demand via `docker compose run --rm harness ...` (see the
  # Makefile `chaos` target). It joins the compose network (so it can DNS-resolve lb/c1..c3)
  # and mounts the docker socket (so it can `docker kill`/`start` sibling containers by name).
  harness:
    build:
      context: .
      dockerfile: harness/Dockerfile
    container_name: harness
    profiles: ["chaos"]
    volumes:
      # Reach the host daemon to kill/start peer containers by name.
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind-mount the harness so edits don't require an image rebuild, and expose /out as the
      # writable drop for the report so the Makefile can copy it back to the repo root.
      - ./chaos_harness.py:/app/chaos_harness.py:ro
      - ./harness_out:/out
      # `make test` runs pytest in THIS image and imports the real coordinator modules against
      # the compose Postgres/Redis, so mount the source + tests + pytest config (read-only).
      - ./coordinator:/app/coordinator:ro
      - ./db:/app/db:ro
      - ./tests:/app/tests:ro
      - ./pytest.ini:/app/pytest.ini:ro
    # Shared DATABASE_URL / REDIS_URL / LEASE_TTL_MS come from .env (for `make test`, which
    # imports the real coordinator modules against the compose Postgres/Redis). Only the
    # harness-specific vars are inline: HARNESS_SEED (interpolated from the host env) and
    # PYTHONPATH (so pytest can import `coordinator/` + the `tests/` package).
    env_file:
      - .env
    environment:
      HARNESS_SEED: "${HARNESS_SEED:-1729}"
      PYTHONPATH: /app/coordinator:/app
    depends_on:
      - lb
