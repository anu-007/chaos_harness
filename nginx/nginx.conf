# nginx load balancer for the coordinator cluster.
# Round-robins client HTTP across c1/c2/c3 and passes WebSocket upgrades on /ws
# through to a coordinator so workers can dial ws://lb:8080/ws.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Round-robin upstream over the three coordinators.
    # max_fails=1 / fail_timeout=2s = passive health check: one failed proxy attempt ejects a
    # coordinator from rotation for 2s, so a SIGKILLed node stops receiving fresh requests
    # almost immediately instead of taking ~1/3 of them (each costing a retry) until it is
    # restarted. 2s tracks the harness's ~90s coord-kill cadence + fast restart.
    upstream coords {
        server c1:8080 max_fails=1 fail_timeout=2s;
        server c2:8080 max_fails=1 fail_timeout=2s;
        server c3:8080 max_fails=1 fail_timeout=2s;
    }

    # Map for WebSocket Upgrade/Connection header passthrough.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;

        # WebSocket endpoint: workers connect here and are pinned to one coordinator
        # for the life of the connection.
        location /ws {
            proxy_pass http://coords;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            # Long-lived: don't time out idle worker connections between dispatches.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # All other traffic (POST /jobs, GET /jobs/{id}, /stats, /chaos, /audit)
        # is plain HTTP round-robined across coordinators.
        location / {
            proxy_pass http://coords;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Transparently fail a request over to a healthy coordinator when the one it
            # landed on is SIGKILLed (error/timeout) or has its DB partitioned by chaos
            # (the handler returns 503 "database partitioned"). non_idempotent is required
            # because nginx will NOT retry POST by default; this is SAFE here because job
            # creation is idempotent — POST /jobs INSERTs ON CONFLICT (idempotency_key) DO
            # NOTHING, so a retried submit on a peer returns the SAME job_id, never a
            # duplicate. Bounded so a request can't fan out forever: at most the 3
            # coordinators within a ~2s budget, leaving slack under the harness's 3s
            # submit_timeout so a retry always completes before the client gives up.
            proxy_next_upstream error timeout http_502 http_503 non_idempotent;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 2s;

            # Fail fast per upstream attempt so the retry fits inside the 3s client budget.
            # Without a short read/send timeout, a coordinator killed AFTER accepting the
            # request but BEFORE responding would leave nginx blocked on the default 60s read
            # timeout — the harness times out at 3s and records a failure long before nginx
            # could retry. Short deadlines turn that into a fast error -> immediate retry.
            proxy_connect_timeout 500ms;
            proxy_read_timeout 1s;
            proxy_send_timeout 1s;
        }
    }
}
