# FarLabs distributed job dispatcher stack.
# Step 7 brings up: postgres (source of truth), redis (optimization), three
# coordinators c1/c2/c3, and the nginx LB. Workers (w1..w5) and the harness runner
# are added in later steps. Service name == container_name for every coordinator so
# the harness can both DNS-resolve (c1/c2/c3, lb) and docker kill/start by name.

x-coordinator-env: &coordinator-env
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/farlabs
  REDIS_URL: redis://redis:6379/0
  LEASE_TTL_MS: "10000"

# Shared worker service definition. Each worker overrides container_name + WORKER_ID.
x-worker: &worker
  build:
    context: .
    dockerfile: worker/Dockerfile
  environment: &worker-env
    LB_WS_URL: ws://lb:8080
    # 5 workers x 16 = 80 concurrent slots. The harness submits at 50 jobs/s with a mixed
    # profile (avg ~1.16s/job: 95% short 100-500ms + 5% long 5-30s), so steady-state drain
    # needs ~58 slots (50 * 1.16). 80 gives headroom for the long-job tail and for slots tied
    # up during fault windows (partition_db / pause_dispatch), so the backlog never grows
    # unboundedly and jobs aren't left un-dispatched at drain -> no "lost" violations.
    WORKER_CONCURRENCY: "16"
  depends_on:
    - lb

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: farlabs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d farlabs"]
      interval: 3s
      timeout: 3s
      retries: 10
    # No host port published: only the coordinators need it, on the compose network.

  redis:
    image: redis:7
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  c1:
    build:
      context: .
      dockerfile: coordinator/Dockerfile
    container_name: c1
    environment:
      <<: *coordinator-env
      COORD_ID: c1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  c2:
    build:
      context: .
      dockerfile: coordinator/Dockerfile
    container_name: c2
    environment:
      <<: *coordinator-env
      COORD_ID: c2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  c3:
    build:
      context: .
      dockerfile: coordinator/Dockerfile
    container_name: c3
    environment:
      <<: *coordinator-env
      COORD_ID: c3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  lb:
    image: nginx:1.27
    container_name: lb
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      - c1
      - c2
      - c3

  w1:
    <<: *worker
    container_name: w1
    environment:
      <<: *worker-env
      WORKER_ID: w1

  w2:
    <<: *worker
    container_name: w2
    environment:
      <<: *worker-env
      WORKER_ID: w2

  w3:
    <<: *worker
    container_name: w3
    environment:
      <<: *worker-env
      WORKER_ID: w3

  w4:
    <<: *worker
    container_name: w4
    environment:
      <<: *worker-env
      WORKER_ID: w4

  w5:
    <<: *worker
    container_name: w5
    environment:
      <<: *worker-env
      WORKER_ID: w5

  # Chaos-harness runner. Behind the `chaos` profile so a plain `docker compose up` never
  # starts it; it is launched on demand via `docker compose run --rm harness ...` (see the
  # Makefile `chaos` target). It joins the compose network (so it can DNS-resolve lb/c1..c3)
  # and mounts the docker socket (so it can `docker kill`/`start` sibling containers by name).
  harness:
    build:
      context: .
      dockerfile: harness/Dockerfile
    container_name: harness
    profiles: ["chaos"]
    volumes:
      # Reach the host daemon to kill/start peer containers by name.
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind-mount the harness so edits don't require an image rebuild, and expose /out as the
      # writable drop for the report so the Makefile can copy it back to the repo root.
      - ./chaos_harness.py:/app/chaos_harness.py:ro
      - ./harness_out:/out
      # `make test` runs pytest in THIS image and imports the real coordinator modules against
      # the compose Postgres/Redis, so mount the source + tests + pytest config (read-only).
      - ./coordinator:/app/coordinator:ro
      - ./db:/app/db:ro
      - ./tests:/app/tests:ro
      - ./pytest.ini:/app/pytest.ini:ro
    environment:
      HARNESS_SEED: "${HARNESS_SEED:-1729}"
      # For `make test`: reach the same source-of-truth Postgres and optimization Redis the
      # coordinators use, and let pytest import `coordinator/` + the `tests/` package.
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/farlabs
      REDIS_URL: redis://redis:6379/0
      LEASE_TTL_MS: "10000"
      PYTHONPATH: /app/coordinator:/app
    depends_on:
      - lb
